<ion-header class="ion-no-border">
    <ion-toolbar>
        <ion-buttons slot="start">
            <ion-back-button defaultHref="/home"></ion-back-button>
        </ion-buttons>
        <ion-title>Notifications</ion-title>
    </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
    <ion-list>
        <ion-item-sliding *ngFor="let notif of notifications">
            <ion-item lines="none" class="notif-item" [class.unread]="!notif.read" (click)="markAsRead(notif.id)">
                <div class="status-indicator" [class]="notif.type"></div>
                <ion-label>
                    <h3>{{notif.title}}</h3>
                    <p>{{notif.message}}</p>
                    <div class="time">{{notif.time | date:'shortTime'}}</div>
                </ion-label>
                <div class="unread-dot" *ngIf="!notif.read"></div>
            </ion-item>

            <ion-item-options side="end">
                <ion-item-option color="danger">
                    <ion-icon slot="icon-only" name="trash"></ion-icon>
                </ion-item-option>
            </ion-item-options>
        </ion-item-sliding>
    </ion-list>
</ion-content>
