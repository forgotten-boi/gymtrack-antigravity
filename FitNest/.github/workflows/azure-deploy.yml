name: Build and Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ACR_NAME: ${{ secrets.REGISTRY_LOGIN_SERVER }}
  API_IMAGE_NAME: fitnest-api
  WEB_IMAGE_NAME: fitnest-web
  MOBILE_IMAGE_NAME: fitnest-mobile

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push API Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: FitNest.Api/Dockerfile
          push: true
          tags: ${{ env.ACR_NAME }}/${{ env.API_IMAGE_NAME }}:${{ github.sha }},${{ env.ACR_NAME }}/${{ env.API_IMAGE_NAME }}:latest

      - name: Build and Push Web Image
        uses: docker/build-push-action@v5
        with:
          context: fitnest-web
          file: fitnest-web/Dockerfile
          push: true
          tags: ${{ env.ACR_NAME }}/${{ env.WEB_IMAGE_NAME }}:${{ github.sha }},${{ env.ACR_NAME }}/${{ env.WEB_IMAGE_NAME }}:latest

      - name: Build and Push Mobile Image
        uses: docker/build-push-action@v5
        with:
          context: fitnest-mobile
          file: fitnest-mobile/Dockerfile
          push: true
          tags: ${{ env.ACR_NAME }}/${{ env.MOBILE_IMAGE_NAME }}:${{ github.sha }},${{ env.ACR_NAME }}/${{ env.MOBILE_IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy API to Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          imageToDeploy: ${{ env.ACR_NAME }}/${{ env.API_IMAGE_NAME }}:${{ github.sha }}
          containerAppName: fitnest-api
          resourceGroup: fitnest-rg

      - name: Deploy Web App to Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          imageToDeploy: ${{ env.ACR_NAME }}/${{ env.WEB_IMAGE_NAME }}:${{ github.sha }}
          containerAppName: fitnest-web
          resourceGroup: fitnest-rg

      - name: Deploy Mobile App (Web) to Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          imageToDeploy: ${{ env.ACR_NAME }}/${{ env.MOBILE_IMAGE_NAME }}:${{ github.sha }}
          containerAppName: fitnest-mobile
          resourceGroup: fitnest-rg
