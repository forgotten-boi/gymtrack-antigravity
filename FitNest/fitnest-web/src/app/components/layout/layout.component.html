<div class="layout" [class.collapsed]="isSidebarCollapsed">
    <aside class="sidebar">
        <div class="sidebar-header">
            <span class="logo-icon">F</span>
            <span class="logo-text" *ngIf="!isSidebarCollapsed">FitNest</span>
            <button class="toggle-btn" (click)="toggleSidebar()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 12h18M3 6h18M3 18h18"/>
                </svg>
            </button>
        </div>

        <nav class="sidebar-nav">
            <a *ngFor="let item of navItems"
               [routerLink]="item.path"
               routerLinkActive="active"
               class="nav-item">
                <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path *ngIf="item.icon === 'grid'" d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/>
                    <path *ngIf="item.icon === 'users'" d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                <span class="nav-label" *ngIf="!isSidebarCollapsed">{{ item.label }}</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-info" *ngIf="currentUser">
                <div class="user-avatar">{{ currentUser.firstName?.charAt(0) }}{{ currentUser.lastName?.charAt(0) }}</div>
                <div class="user-details" *ngIf="!isSidebarCollapsed">
                    <span class="user-name">{{ currentUser.firstName }} {{ currentUser.lastName }}</span>
                    <span class="user-role">{{ currentUser.role }}</span>
                </div>
            </div>
            <button class="logout-btn" (click)="logout()" title="Logout">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
                </svg>
            </button>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div class="top-bar-left">
                <div class="breadcrumb">
                    <span class="breadcrumb-text">Coach Portal</span>
                </div>
            </div>
            <div class="top-bar-right">
                <div class="notification-wrapper">
                    <button class="icon-btn" (click)="toggleNotifications()" title="Notifications">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/>
                        </svg>
                        <span class="notification-badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
                    </button>

                    <div class="notification-dropdown" *ngIf="showNotifications">
                        <div class="dropdown-header">
                            <h3>Notifications</h3>
                            <button class="mark-read-btn" (click)="markAllRead()">Mark all read</button>
                        </div>
                        <div class="dropdown-list">
                            <div class="notification-item" *ngFor="let n of notifications; let i = index"
                                 [class.unread]="!n.read" (click)="markAsRead(i)">
                                <div class="notif-icon">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path *ngIf="n.icon === 'dumbbell'" d="M6 5v14M18 5v14M2 8h4M18 8h4M2 16h4M18 16h4M6 8h12v8H6z"/>
                                        <path *ngIf="n.icon === 'trophy'" d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 19.24 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 19.24 17 22M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
                                        <path *ngIf="n.icon === 'target'" d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10zM12 18a6 6 0 1 0 0-12 6 6 0 0 0 0 12zM12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/>
                                        <path *ngIf="n.icon === 'user-plus'" d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M8.5 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM20 8v6M23 11h-6"/>
                                        <path *ngIf="n.icon === 'file-text'" d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8zM14 2v6h6M16 13H8M16 17H8M10 9H8"/>
                                    </svg>
                                </div>
                                <div class="notif-content">
                                    <span class="notif-message">{{ n.message }}</span>
                                    <span class="notif-time">{{ n.time }}</span>
                                </div>
                                <span class="unread-dot" *ngIf="!n.read"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div class="page-content">
            <router-outlet></router-outlet>
        </div>
    </main>
</div>
